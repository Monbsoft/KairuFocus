<!-- @dsCard group="Colors" viewport="700x160" name="Status — Semantic" subtitle="success · danger · warning · info · task — solid + subtle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 44px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
  .sub { height: 22px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700; }
  .lbl { margin-top: 8px; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="sub" style="background:var(--success-subtle);color:var(--success-text)">Aa</div><div class="lbl">success</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="sub" style="background:var(--danger-subtle);color:var(--danger-text)">Aa</div><div class="lbl">danger</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="sub" style="background:var(--warning-subtle);color:var(--warning-text)">Aa</div><div class="lbl">warning</div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="sub" style="background:var(--info-subtle);color:var(--info-text)">Aa</div><div class="lbl">info</div></div>
    <div class="sw"><div class="chip" style="background:var(--task)"></div><div class="sub" style="background:var(--task-subtle);color:var(--task)">Aa</div><div class="lbl">task</div></div>
  </div>
</body>
</html>
