<!-- @dsCard group="Spacing" viewport="700x180" name="Scale — 4px base" subtitle="Single ramp for padding, gap & margins" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--primary); border-radius: var(--radius-xs); width: 100%; }
  .box { width: 40px; }
  .lbl { margin-top: 6px; font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); }
  .nm { font-size: 11px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item box"><div class="bar" style="height:var(--space-1)"></div><div class="nm">1</div><div class="lbl">4</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-2)"></div><div class="nm">2</div><div class="lbl">8</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-3)"></div><div class="nm">3</div><div class="lbl">12</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-4)"></div><div class="nm">4</div><div class="lbl">16</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-6)"></div><div class="nm">6</div><div class="lbl">24</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-8)"></div><div class="nm">8</div><div class="lbl">32</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-12)"></div><div class="nm">12</div><div class="lbl">48</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-16)"></div><div class="nm">16</div><div class="lbl">64</div></div>
  </div>
</body>
</html>
