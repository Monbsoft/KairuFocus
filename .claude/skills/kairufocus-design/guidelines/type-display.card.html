<!-- @dsCard group="Type" viewport="700x260" name="Scale — Display & headings" subtitle="System sans · tight tracking on large sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; flex-shrink: 0; }
  .h3 { font-size: var(--text-3xl); font-weight: var(--weight-extra); letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); }
  .h2x { font-size: var(--text-2xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
  .hx { font-size: var(--text-xl); font-weight: var(--weight-bold); }
  .hl { font-size: var(--text-lg); font-weight: var(--weight-semibold); }
</style>
</head>
<body>
  <div class="line"><div class="spec">3xl · 48 / 800</div><div class="h3">Stay focused</div></div>
  <div class="line"><div class="spec">2xl · 36 / 700</div><div class="h2x">Bonjour, dev 👋</div></div>
  <div class="line"><div class="spec">xl · 28 / 700</div><div class="hx">Tâches</div></div>
  <div class="line"><div class="spec">lg · 22 / 600</div><div class="hl">Tâches du sprint</div></div>
</body>
</html>
