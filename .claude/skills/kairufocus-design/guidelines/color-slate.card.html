<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate ramp" subtitle="Cool slate scale powering all dark-theme surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--kf-slate-950); font-family: var(--font-sans); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,.06); }
  .lbl { margin-top: 6px; font-size: 10px; color: var(--kf-slate-400); font-family: var(--font-mono); text-align:center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kf-slate-950)"></div><div class="lbl">950</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-900)"></div><div class="lbl">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-800)"></div><div class="lbl">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-700)"></div><div class="lbl">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-400)"></div><div class="lbl">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-300)"></div><div class="lbl">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-slate-200)"></div><div class="lbl">200</div></div>
  </div>
</body>
</html>
