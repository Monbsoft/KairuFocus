<!-- @dsCard group="Type" viewport="700x200" name="Mono — JetBrains Mono" subtitle="Pomodoro clock, code, tags-as-data, tabular numerals" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-mono); color: var(--text-primary); display:flex; gap:32px; align-items:center; }
  .clock { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .code { font-size: 13px; color: var(--text-secondary); }
  .k { color: var(--primary); }
  .s { color: var(--success); }
  .lbl { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="col">
    <div class="clock">24:59</div>
    <div class="lbl">--font-mono · tabular-nums</div>
  </div>
  <div class="col">
    <div class="code"><span class="k">git</span> commit -m <span class="s">"feat: tasks"</span></div>
    <div class="code">SprintDuration = <span class="k">25</span>;</div>
    <div class="code">#focus &nbsp;#backend &nbsp;#wip</div>
  </div>
</body>
</html>
