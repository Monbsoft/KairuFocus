<!-- @dsCard group="Colors" viewport="700x300" name="Surfaces — Light & Dark" subtitle="base · card · elevated · sunken — both themes side by side" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); display: flex; }
  .pane { flex: 1; padding: 20px; background: var(--surface-base); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .surf { padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); color: var(--text-primary); font-size: 13px; display:flex; justify-content:space-between; }
  .surf small { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
  .tag { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; font-weight: 700; }
</style>
</head>
<body>
  <div class="pane" data-bs-theme="light">
    <div class="tag">Light</div>
    <div class="stack">
      <div class="surf" style="background:var(--surface-base)">base <small>--surface-base</small></div>
      <div class="surf" style="background:var(--surface-card)">card <small>--surface-card</small></div>
      <div class="surf" style="background:var(--surface-sunken)">sunken <small>--surface-sunken</small></div>
    </div>
  </div>
  <div class="pane" data-bs-theme="dark">
    <div class="tag">Dark</div>
    <div class="stack">
      <div class="surf" style="background:var(--surface-base)">base <small>--surface-base</small></div>
      <div class="surf" style="background:var(--surface-card)">card <small>--surface-card</small></div>
      <div class="surf" style="background:var(--surface-sunken)">sunken <small>--surface-sunken</small></div>
    </div>
  </div>
</body>
</html>
