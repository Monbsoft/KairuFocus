<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Gray ramp" subtitle="Warm-gray scale for light surfaces, borders & text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,.06); }
  .lbl { margin-top: 6px; font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); text-align:center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kf-gray-50)"></div><div class="lbl">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-100)"></div><div class="lbl">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-200)"></div><div class="lbl">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-300)"></div><div class="lbl">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-400)"></div><div class="lbl">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-500)"></div><div class="lbl">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-700)"></div><div class="lbl">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-gray-900)"></div><div class="lbl">900</div></div>
  </div>
</body>
</html>
