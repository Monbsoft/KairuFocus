<!-- @dsCard group="Type" viewport="700x230" name="Scale — Body & UI text" subtitle="md lead · base body · sm meta · xs eyebrow / badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; flex-shrink: 0; }
  .md { font-size: var(--text-md); }
  .base { font-size: var(--text-base); }
  .sm { font-size: var(--text-sm); color: var(--text-secondary); }
  .eyebrow { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: var(--weight-bold); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="line"><div class="spec">md · 18 / 400</div><div class="md">Your entire workflow in one place.</div></div>
  <div class="line"><div class="spec">base · 16 / 400</div><div class="base">Daily micro-tasks with statuses and Markdown editing.</div></div>
  <div class="line"><div class="spec">sm · 14 / 400</div><div class="sm">Automatically generated activity timeline.</div></div>
  <div class="line"><div class="spec">xs · 12 / 700</div><div class="eyebrow">Accès rapides</div></div>
</body>
</html>
