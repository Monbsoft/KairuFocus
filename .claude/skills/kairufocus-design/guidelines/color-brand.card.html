<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; align-items: stretch; }
  .sw { flex: 1; }
  .chip { height: 72px; border-radius: var(--radius-md); }
  .lbl { margin-top: 8px; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .tall { display:flex; gap:10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--kf-ink-850)"></div><div class="lbl">ink-850</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-ink-800)"></div><div class="lbl">ink-800</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-ink-700)"></div><div class="lbl">ink-700</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-sidebar)"></div><div class="lbl">sidebar rail</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-hero)"></div><div class="lbl">hero gradient</div></div>
    <div class="sw"><div class="chip" style="background:var(--kf-coral-500)"></div><div class="lbl">coral · accent</div></div>
  </div>
</body>
</html>
