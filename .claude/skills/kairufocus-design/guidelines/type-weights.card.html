<!-- @dsCard group="Type" viewport="700x140" name="Weights & tracking" subtitle="400 → 800; uppercase eyebrows use wide tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .row { display: flex; gap: 28px; align-items: baseline; flex-wrap: wrap; }
  .w { font-size: 24px; }
  .cap { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); display:block; margin-top:4px; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><span class="w" style="font-weight:400">Aa</span><span class="cap">400 regular</span></div>
    <div class="item"><span class="w" style="font-weight:500">Aa</span><span class="cap">500 medium</span></div>
    <div class="item"><span class="w" style="font-weight:600">Aa</span><span class="cap">600 semibold</span></div>
    <div class="item"><span class="w" style="font-weight:700">Aa</span><span class="cap">700 bold</span></div>
    <div class="item"><span class="w" style="font-weight:800">Aa</span><span class="cap">800 extra</span></div>
    <div class="item"><span class="w" style="font-weight:700;text-transform:uppercase;letter-spacing:var(--tracking-wider);font-size:14px">Aujourd'hui</span><span class="cap">wider · 0.18em</span></div>
  </div>
</body>
</html>
