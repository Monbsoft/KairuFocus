<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="xs chips → sm controls → md menus → lg cards → xl logo → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); display:flex; gap:18px; align-items:flex-end; }
  .item { text-align: center; }
  .box { width: 72px; height: 56px; background: var(--primary-subtle); border: 2px solid var(--primary); }
  .nm { margin-top: 8px; font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .lbl { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="nm">xs</div><div class="lbl">4px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="nm">sm</div><div class="lbl">6px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="nm">md</div><div class="lbl">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="nm">lg</div><div class="lbl">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="nm">xl</div><div class="lbl">18px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="nm">pill</div><div class="lbl">999px</div></div>
</body>
</html>
