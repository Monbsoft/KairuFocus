<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-base); font-family: var(--font-sans); }
  .grp { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .cap { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); width: 100%; margin-bottom: 4px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, Tag, Avatar, Card, StatCard } = window.KairuFocusDesignSystem_0d3740;
  ReactDOM.createRoot(document.getElementById("root")).render(
    <>
      <div className="grp"><span className="cap">Badge — task status</span>
        <Badge status="Todo" dot/><Badge status="InProgress"/><Badge status="Done"/>
        <Badge variant="info">MCP</Badge><Badge variant="danger">Overdue</Badge>
      </div>
      <div className="grp"><span className="cap">Tag — hashed colors</span>
        <Tag hash>backend</Tag><Tag hash>focus</Tag><Tag hash>bug</Tag><Tag hash>wip</Tag>
        <Tag hash onRemove={()=>{}}>refactor</Tag>
      </div>
      <div className="grp"><span className="cap">Avatar</span>
        <Avatar name="Dev Kairu" size="sm"/><Avatar name="Dev Kairu" size="md"/><Avatar name="Dev Kairu" size="lg"/>
      </div>
      <div className="cap">StatCard — dashboard tiles</div>
      <div className="stats">
        <StatCard icon="☑️" value={6} label="Tâches en cours" as="div"/>
        <StatCard icon="🍅" value="En cours" label="Sprint · 24:59" tone="success" active as="div"/>
      </div>
    </>
  );
</script>
</body>
</html>
