<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KairuFocus — Pomodoro</title>
<link rel="stylesheet" href="../../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<style>html,body{margin:0;background:var(--surface-base)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="../mockData.jsx"></script>
<script type="text/babel" src="../AppShell.jsx"></script>
<script type="text/babel" src="../PomodoroScreen.jsx"></script>
<script type="text/babel">
function Demo(){
  const [theme,setTheme]=React.useState("light");
  const toggle=()=>{const n=theme==="light"?"dark":"light";setTheme(n);document.documentElement.setAttribute("data-bs-theme",n);};
  const d=window.KFData; const tasks=d.initialTasks;
  return <window.AppShell active="pomodoro" onNavigate={()=>{}} onLogout={()=>{}} theme={theme} onToggleTheme={toggle} user={d.user}>
    <window.PomodoroScreen linkedTasks={tasks.filter(t=>t.status==="InProgress")} onCompleteLinked={()=>{}} onUnlink={()=>{}} running={false} onRunningChange={()=>{}} onSprintLibre={()=>{}} />
  </window.AppShell>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
